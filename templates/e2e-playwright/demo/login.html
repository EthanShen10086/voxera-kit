<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign in</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Sign in</h1>
      <form id="login-form">
        <label>
          Email
          <input name="email" type="email" data-testid="email" required />
        </label>
        <label>
          Password
          <input name="password" type="password" data-testid="password" required />
        </label>
        <p id="error" class="error" data-testid="error" hidden></p>
        <button type="submit" data-testid="submit">Continue</button>
      </form>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
