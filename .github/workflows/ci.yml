name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint:
    name: Go Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: golangci-lint (per module)
        working-directory: backend
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== lint $module ==="
            (cd "$module" && golangci-lint run --config=../.golangci.yml --timeout=5m ./...)
          done
      - name: Go Vet (all modules)
        working-directory: backend
        run: |
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== vet $module ==="
            (cd "$module" && go vet ./...)
          done

  go-contract:
    name: Go Contract Tests
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: Port contract tests (no Docker)
        working-directory: backend
        run: bash scripts/contract-test.sh

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: Build all modules
        working-directory: backend
        run: |
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== build $module ==="
            (cd "$module" && go build ./...)
          done

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: Test all modules (race)
        working-directory: backend
        run: |
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== test $module ==="
            (cd "$module" && go test ./... -race -count=1)
          done

  go-coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: Merge module coverage profiles
        working-directory: backend
        env:
          MIN_COVERAGE: "50"
          COVERAGE_ENFORCE: "true"
          COVERAGE_SKIP: testkit
        run: bash scripts/coverage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: backend/coverage/merged.out
          retention-days: 7
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/merged.out
          flags: backend
          fail_ci_if_error: false

  go-integration:
    name: Go Integration (testcontainers)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: testkit contract smoke
        working-directory: backend/testkit
        run: go test -tags=integration -race -count=1 -timeout=15m ./...
      - name: adapter integration (postgres, minio)
        working-directory: backend
        run: |
          (cd database && go test -tags=integration -race -count=1 -timeout=15m ./postgres/...)
          (cd storage && go test -tags=integration -race -count=1 -timeout=15m ./minio/...)

  e2e-smoke:
    name: E2E Smoke (Playwright template)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Playwright template smoke
        working-directory: templates/e2e-playwright
        run: |
          npm install
          npm run install:browsers
          npm test

  ts-test:
    name: TypeScript Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend

  consumer-smoke:
    name: Downstream MsgGuard build
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4
        with:
          path: voxera-kit
      - uses: actions/checkout@v4
        with:
          repository: EthanShen10086/MsgGuard
          path: MsgGuard
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build MsgGuard gateway against workspace kit
        run: |
          cd "$GITHUB_WORKSPACE/MsgGuard"
          export GOWORK="$GITHUB_WORKSPACE/MsgGuard/go.work"
          cd services/gateway
          go build -o /dev/null ./cmd/server

  ts-lint:
    name: TypeScript Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: TypeScript typecheck
        working-directory: frontend
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/tsconfig.json" ]; then
              echo "=== typecheck $pkg ==="
              npx tsc --noEmit -p "$pkg/tsconfig.json"
            fi
          done
