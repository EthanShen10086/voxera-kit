name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint:
    name: Go Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/**/go.sum
      - name: golangci-lint (per module)
        working-directory: backend
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== lint $module ==="
            (cd "$module" && golangci-lint run --config=../.golangci.yml --timeout=5m ./...)
          done
      - name: Go Vet (all modules)
        working-directory: backend
        run: |
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== vet $module ==="
            (cd "$module" && go vet ./...)
          done

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/**/go.sum
      - name: Build all modules
        working-directory: backend
        run: |
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== build $module ==="
            (cd "$module" && go build ./...)
          done

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/**/go.sum
      - name: Test all modules (race + coverage)
        working-directory: backend
        run: |
          echo "mode: atomic" > coverage.out
          for dir in $(awk '/\.\//{gsub(/[[:space:]]/, ""); gsub(/\)/, ""); if(/^\.\//) print}' go.work); do
            module="${dir#./}"
            echo "=== test $module ==="
            (cd "$module" && go test ./... -race -count=1 -coverprofile=cover.tmp -covermode=atomic)
            if [ -f "$module/cover.tmp" ]; then
              tail -n +2 "$module/cover.tmp" >> coverage.out
              rm -f "$module/cover.tmp"
            fi
          done
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          flags: go
          fail_ci_if_error: false

  ts-test:
    name: TypeScript Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend

  consumer-smoke:
    name: Downstream MsgGuard build
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4
        with:
          path: voxera-kit
      - uses: actions/checkout@v4
        with:
          repository: EthanShen10086/MsgGuard
          path: MsgGuard
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build MsgGuard gateway against workspace kit
        run: |
          export GOPRIVATE=github.com/EthanShen10086/*
          KIT="$GITHUB_WORKSPACE/voxera-kit/backend"
          cd "$GITHUB_WORKSPACE/MsgGuard/services/gateway"
          for mod in aiquota audit auth circuitbreaker featureflag loadshed middleware observability pii security; do
            go mod edit -replace "github.com/EthanShen10086/voxera-kit/${mod}=${KIT}/${mod}"
          done
          go mod tidy
          go build -o /dev/null ./cmd/server

  ts-lint:
    name: TypeScript Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: TypeScript typecheck
        working-directory: frontend
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/tsconfig.json" ]; then
              echo "=== typecheck $pkg ==="
              npx tsc --noEmit -p "$pkg/tsconfig.json"
            fi
          done
