name: Changelog Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  changelog-release:
    if: vars.CI_RELEASE_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decide whether to release
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif echo "${{ github.event.head_commit.message }}" | grep -qF '[release]'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run semver release
        if: steps.gate.outputs.run == 'true'
        env:
          RELEASE_IN_CI: '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BEFORE=$(git rev-parse HEAD)
          node scripts/changelog-release.mjs
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            git push origin "${{ github.ref_name }}" --follow-tags
          else
            echo "No release commit created; skip push"
          fi
