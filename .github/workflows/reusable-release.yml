name: Reusable Release Artifacts
on:
  workflow_call:
    inputs:
      image:
        type: string
        description: Full image name e.g. ghcr.io/owner/app
      tag:
        type: string
        required: true
    secrets:
      COSIGN_PRIVATE_KEY:
        required: false

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json

  cosign:
    if: inputs.image != ''
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - name: Install cosign
        run: |
          curl -sLO https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x cosign-linux-amd64 && sudo mv cosign-linux-amd64 /usr/local/bin/cosign
      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then
            echo "::notice::Cosign skipped — set COSIGN_PRIVATE_KEY secret."
            exit 0
          fi
          echo "Sign ${{ inputs.image }}:${{ inputs.tag }} when image is built in caller workflow"
