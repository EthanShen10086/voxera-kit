name: Nightly

# Scheduled runs paused — use workflow_dispatch to run manually.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 3 * * *"

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Go Integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: testkit contract smoke
        working-directory: backend/testkit
        run: go test -tags=integration -race -count=1 -timeout=15m ./...
      - name: adapter integration (postgres, minio, kafka, rabbitmq)
        working-directory: backend
        run: |
          (cd database && go test -tags=integration -race -count=1 -timeout=15m ./postgres/...)
          (cd storage && go test -tags=integration -race -count=1 -timeout=15m ./minio/...)
          (cd mq && go test -tags=integration -race -count=1 -timeout=15m ./kafka/... ./rabbitmq/...)

  e2e-smoke:
    name: E2E Smoke (Playwright template)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install and run Playwright template
        working-directory: templates/e2e-playwright
        run: |
          npm install
          npm run install:browsers
          npm test

  coverage:
    name: Go Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: backend/**/go.sum
      - name: Merge module coverage
        working-directory: backend
        env:
          MIN_COVERAGE: "80"
          COVERAGE_ENFORCE: "true"
          COVERAGE_SKIP: testkit
        run: bash scripts/coverage.sh
      - name: Integration coverage probe (requires Docker)
        working-directory: backend
        env:
          MIN_COVERAGE: "80"
          COVERAGE_ENFORCE: "false"
          COVERAGE_SKIP: testkit
          COVERAGE_TAGS: integration
        run: bash scripts/coverage.sh
      - uses: actions/upload-artifact@v7
        with:
          name: go-coverage-nightly
          path: backend/coverage/merged.out
          retention-days: 14
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: backend/coverage/merged.out
          flags: backend
          fail_ci_if_error: false
