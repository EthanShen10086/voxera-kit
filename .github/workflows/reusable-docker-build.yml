name: Reusable Docker Build
on:
  workflow_call:
    inputs:
      service-name:
        type: string
        required: true
      context:
        type: string
        required: true
      image-tag:
        type: string
        required: true
    secrets:
      registry-token:
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}:${{ inputs.image-tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
